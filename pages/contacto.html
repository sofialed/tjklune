<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Fonts titulos (Limelight) -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
    <!-- Fonts texto (Oswald) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <title>TJ KLUNE | Autor</title>
</head>

<body>
    <header>
        <a class="navbar-brand" href="../index.html"><img src="../img/logo.png" class="logo" alt="Logo"></a>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav class="navbar">
            <ul class="navbar-nav">
                <li><a class="nav-link" href="../index.html">Inicio</a></li>
                <li><a class="nav-link" href="./libros.html">Libros</a></li>
                <li><a class="nav-link" href="./sobre.html">Sobre el Autor</a></li>
                <li><a class="nav-link active" href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
        <section class="social-icon-header">
            <a href="https://www.goodreads.com/author/show/5073330.T_J_Klune?ref=ru_lihp_up_rs_6_mclk-up3098240307" target="_blank">
                <img src="../img/goodreads.png" alt="Goodreads" class="social-icon">
            </a>
            <a href="https://www.instagram.com/tjklunebooks/" target="_blank">
                <img src="../img/instagram.png" alt="Instagram" class="social-icon">
            </a>
        </section>
    </header>
    <main>
        <div class="contacto">
            <h2>Contactanos</h2>
            <form action="/enviar" method="post">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" placeholder="Tu nombre" required>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required>

                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" rows="5" placeholder="Tu mensaje" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-overlay">
            <div class="footer-content">
                <h5>¡Gracias por la visita!</h5>
                <div class="social-links">
                    <a href="https://www.instagram.com/tjklunebooks/">
                        <img src="../img/instagram.png" alt="Instagram">
                    </a>
                    <a
                        href="https://www.goodreads.com/author/show/5073330.T_J_Klune?ref=ru_lihp_up_rs_6_mclk-up3098240307">
                        <img src="../img/goodreads.png" alt="Goodreads">
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>
